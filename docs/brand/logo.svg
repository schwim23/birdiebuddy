<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#2E7D32"/>

  <!-- Inner radial depth -->
  <radialGradient id="bgGrad" cx="45%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#43A047" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1B5E20" stop-opacity="0.3"/>
  </radialGradient>
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- ===== BIRD SILHOUETTE (white, facing right) ===== -->
  <g fill="white">
    <!-- Body: rounded ellipse -->
    <ellipse cx="210" cy="175" rx="70" ry="34" transform="rotate(-12, 210, 175)"/>

    <!-- Head -->
    <circle cx="268" cy="152" r="28"/>

    <!-- Beak -->
    <polygon points="294,148 328,155 294,162"/>

    <!-- Tail (pointing left) -->
    <polygon points="148,180 108,158 112,188 100,200 140,192"/>

    <!-- Upper wing: large swept-back curve -->
    <path d="
      M 190,162
      C 180,120 140,80  80,68
      C 120,72 160,90  180,110
      C 150,78 110,55  60,52
      C 110,62 155,88  175,118
      C 155,90 125,68  80,62
      C 130,72 165,100 182,130
      C 190,148 194,156 190,162 Z
    "/>

    <!-- Lower wing underside (gives wing depth) -->
    <path d="
      M 190,162
      C 185,172 160,180 130,185
      C 155,178 175,170 190,162 Z
    " opacity="0.6"/>
  </g>

  <!-- ===== GOLF FLAG + PIN ===== -->
  <!-- Pole -->
  <rect x="196" y="240" width="8" height="110" fill="white" rx="4"/>

  <!-- Flag: gold triangle -->
  <polygon points="204,244 258,264 204,284" fill="#FFC107"/>

  <!-- Cup at base -->
  <ellipse cx="200" cy="350" rx="28" ry="10" fill="#1B5E20"/>
  <ellipse cx="200" cy="348" rx="22" ry="7" fill="#2E7D32"/>
</svg>
