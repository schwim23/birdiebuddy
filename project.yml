name: BirdieBuddy
options:
  bundleIdPrefix: com.schwim23
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  BirdieBuddy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BirdieBuddy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schwim23.BirdieBuddy
        INFOPLIST_FILE: BirdieBuddy/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: BirdieBuddy/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Birdie Buddy
        NSMicrophoneUsageDescription: "Birdie Buddy uses the microphone so you can speak your score hands-free."
        NSSpeechRecognitionUsageDescription: "Birdie Buddy uses speech recognition to hear your spoken score."
        NSCameraUsageDescription: "Birdie Buddy uses the camera so you can photograph a scorecard to auto-fill course setup."
        NSPhotoLibraryUsageDescription: "Birdie Buddy reads photos so you can pick a scorecard image to auto-fill course setup."

  BirdieBuddyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BirdieBuddyTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schwim23.BirdieBuddyTests
        TEST_TARGET_NAME: BirdieBuddy
        INFOPLIST_FILE: BirdieBuddyTests/Info.plist
    dependencies:
      - target: BirdieBuddy
    info:
      path: BirdieBuddyTests/Info.plist
      properties:
        NSPrincipalClass: ""

  BirdieBuddyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BirdieBuddyUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schwim23.BirdieBuddyUITests
        TEST_TARGET_NAME: BirdieBuddy
        INFOPLIST_FILE: BirdieBuddyUITests/Info.plist
    dependencies:
      - target: BirdieBuddy
    info:
      path: BirdieBuddyUITests/Info.plist
      properties:
        NSPrincipalClass: ""

schemes:
  BirdieBuddy:
    build:
      targets:
        BirdieBuddy: all
        BirdieBuddyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: BirdieBuddyTests
          parallelizable: true
        - name: BirdieBuddyUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
